# OpenObscure — GCP Secret Manager via Secrets Store CSI Driver
#
# Pattern: Workload Identity + CSI driver mounts the FPE key as a file at
# /run/secrets/openobscure-master-key — matched by OpenObscure's step 2.
#
# Prerequisites:
#   gcloud secrets create openobscure-fpe-key \
#     --data-file=<(openobscure print-key | tr -d '\n')
#   gcloud secrets add-iam-policy-binding openobscure-fpe-key \
#     --member="serviceAccount:PROJECT.svc.id.goog[NAMESPACE/KUBE_SA]" \
#     --role="roles/secretmanager.secretAccessor"

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: openobscure-gcp-secrets
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/MY_PROJECT/secrets/openobscure-fpe-key/versions/latest"
        fileName: "openobscure-master-key"
  # Optionally sync as a K8s Secret for non-CSI workloads:
  # secretObjects:
  #   - secretName: openobscure-fpe
  #     type: Opaque
  #     data:
  #       - objectName: openobscure-master-key
  #         key: master-key

---
# Example Pod using the SecretProviderClass above.
# Replace with your actual Deployment referencing the same volume.
apiVersion: v1
kind: Pod
metadata:
  name: openobscure-gateway
spec:
  serviceAccountName: openobscure-ksa   # must have Workload Identity bound
  containers:
    - name: openobscure
      image: ghcr.io/openobscure/openobscure:slim
      ports:
        - containerPort: 18790
      volumeMounts:
        - name: fpe-secret
          mountPath: /run/secrets
          readOnly: true
  volumes:
    - name: fpe-secret
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: openobscure-gcp-secrets
