# OpenObscure — Kubernetes Secret for FPE key
#
# Create with kubectl (key is never stored in Git):
#
#   kubectl create secret generic openobscure-fpe \
#     --from-literal=master-key=$(openobscure print-key)
#
# The Deployment below mounts this at /run/secrets/openobscure-master-key,
# which OpenObscure picks up automatically (step 2 of key resolution).

apiVersion: v1
kind: Secret
metadata:
  name: openobscure-fpe
  labels:
    app: openobscure-gateway
type: Opaque
# data.master-key: base64(64-hex-chars)
# Populate via kubectl create secret — do NOT commit actual key values here.
