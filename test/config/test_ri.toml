# OpenObscure Test Configuration — Response Integrity Testing
#
# Like test_fpe.toml but with response integrity enabled and upstream
# pointing to the RI mock server (returns canned persuasive/clean responses).
#
# Usage:
#   # Terminal 1: Start RI mock server
#   node test/scripts/mock/ri_mock_server.mjs
#
#   # Terminal 2: Start proxy with this config
#   OPENOBSCURE_MASTER_KEY=$(openssl rand -hex 32) \
#     ./target/release/openobscure-proxy --config test/config/test_ri.toml serve
#
#   # Terminal 3: Run tests
#   ./test/scripts/test_response_integrity.sh

[proxy]
listen_addr = "127.0.0.1"
port = 18790
request_timeout_secs = 180
max_body_bytes = 16777216
fail_mode = "open"

[fpe]
enabled = true
keychain_service = "openobscure"
keychain_user = "fpe-master-key"

[scanner]
enabled = true
ner_model_dir = "openobscure-proxy/models/ner"
skip_fields = ["model", "stream", "temperature", "max_tokens", "top_p", "top_k"]

[image]
enabled = false

[voice]
enabled = false

[response_integrity]
enabled = true
sensitivity = "medium"
log_only = false

[logging]
level = "info"
json_output = false
pii_scrub = true

# RI mock server as upstream — returns canned persuasive/clean responses
[providers.anthropic]
upstream_url = "http://127.0.0.1:18793"
route_prefix = "/anthropic"
strip_headers = ["x-openobscure-internal"]
