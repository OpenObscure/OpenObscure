# OpenObscure Test Configuration — FPE Testing with Echo Server
#
# Routes all providers to the local echo server so test scripts can capture
# the FPE-encrypted request bodies that the proxy sends upstream.
#
# Usage:
#   # Terminal 1: Start echo server
#   node test/scripts/echo_server.mjs
#
#   # Terminal 2: Start proxy with this config
#   OPENOBSCURE_MASTER_KEY=$(openssl rand -hex 32) \
#     ./target/release/openobscure-core --config test/config/test_fpe.toml serve
#
#   # Terminal 3: Run tests
#   ./test/scripts/test_gateway_all.sh

[proxy]
listen_addr = "127.0.0.1"
port = 18790
request_timeout_secs = 180
max_body_bytes = 16777216
body_limit_full = 16777216
fail_mode = "open"

[fpe]
enabled = true
keychain_service = "openobscure"
keychain_user = "fpe-master-key"

[scanner]
enabled = true
ner_model_dir = "openobscure-core/models/ner"
ner_model_dir_lite = "openobscure-core/models/ner-lite"
ner_pool_size = 4
skip_fields = ["model", "stream", "temperature", "max_tokens", "top_p", "top_k"]

[image]
enabled = true
face_detection = true
face_model = "scrfd"
face_model_dir_scrfd = "openobscure-core/models/scrfd"
face_model_dir = "openobscure-core/models/blazeface"
ocr_enabled = true
ocr_model_dir = "openobscure-core/models/paddleocr"
nsfw_detection = true
nsfw_model_dir = "openobscure-core/models/nudenet"
screen_guard = true
exif_strip = true

[voice]
enabled = true
kws_model_dir = "openobscure-core/models/kws"
kws_keywords_file = "openobscure-core/models/kws/keywords.txt"

[logging]
level = "info"
json_output = false
pii_scrub = true

# Echo server as upstream — captures FPE-encrypted request bodies
[providers.anthropic]
upstream_url = "http://127.0.0.1:18791"
route_prefix = "/anthropic"
strip_headers = ["x-openobscure-internal"]
