# OpenObscure PII Privacy Proxy Configuration
# See project-plan/MASTER_PLAN.md for full documentation.

[proxy]
listen_addr = "127.0.0.1"
port = 18790
request_timeout_secs = 300
max_body_bytes = 16777216   # 16MB
# "open" (default): forward original body on processing errors (never block AI)
# "closed": reject request with 502 if body processing fails (strict privacy)
fail_mode = "open"

[fpe]
enabled = true
keychain_service = "openobscure"
keychain_user = "fpe-master-key"

# Per-type overrides: set to false to disable FPE for specific PII types
# [fpe.type_overrides]
# credit_card = true
# ssn = true
# phone = true
# email = true
# api_key = true

[scanner]
enabled = true
skip_fields = ["model", "stream", "temperature", "max_tokens", "top_p", "top_k"]

# Custom regex patterns (in addition to built-in CC, SSN, phone, email, API key)
# [scanner.custom_patterns.my_pattern]
# regex = "CUSTOM-[A-Z]{4}-[0-9]{8}"
# radix = 36
# alphabet = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ"

[logging]
level = "info"
json_output = false
# file_path = "/var/log/openobscure/proxy.log"  # Uncomment to log to file
# max_file_size = 10485760   # 10MB per file before rotation
# max_files = 3              # Keep 3 rotated log files
# audit_log_path = "/var/log/openobscure/audit.jsonl"  # GDPR audit trail
pii_scrub = true             # Scrub PII from log output (defense-in-depth)
# crash_buffer = false       # mmap crash buffer for post-mortem debugging
# crash_buffer_size = 2097152  # 2MB crash buffer

[image]
enabled = true
face_model_dir = "models/blazeface"
face_model_dir_scrfd = "models/scrfd"
ocr_model_dir = "models/paddleocr"
nsfw_model_dir = "models/nudenet"
# max_dimension = 960           # Resize longest edge (default: 960)
# nsfw_threshold = 0.45         # NSFW confidence threshold (default: 0.45)
# model_idle_timeout_secs = 300 # Evict models after N seconds idle (default: 300)

# --- Response Integrity (Cognitive Firewall) ---
# Scans LLM responses for persuasion/manipulation techniques (EU AI Act Article 5).
# When enabled, detects urgency, scarcity, social proof, fear, authority, commercial,
# and flattery patterns. Can log detections and/or prepend warning labels.
# R1 = dictionary-based regex scan; R2 = TinyBERT ONNX classifier (conditional cascade).
# [response_integrity]
# enabled = false
# sensitivity = "medium"    # off, low, medium, high
# log_only = true           # true = log only; false = prepend warning labels to responses
# ri_model_dir = "models/ri" # R2 TinyBERT model directory

# --- Provider Definitions ---
# Each provider maps a local path prefix to an upstream API URL.
# Auth headers from the host agent pass through unchanged — no duplicate key management.

[providers.anthropic]
upstream_url = "https://api.anthropic.com"
route_prefix = "/anthropic"
strip_headers = ["x-openobscure-internal"]

[providers.openai]
upstream_url = "https://api.openai.com"
route_prefix = "/openai"
strip_headers = ["x-openobscure-internal"]

[providers.ollama]
upstream_url = "http://127.0.0.1:11434"
route_prefix = "/ollama"
strip_headers = []
