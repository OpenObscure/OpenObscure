name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  proxy-test:
    name: Proxy Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: openobscure-proxy

      - name: Test (default features)
        # --lib --bin --tests: run all test targets but skip building the cdylib,
        # which requires native libs (onnxruntime, sherpa-onnx) not in rust-cache.
        # cdylib is only needed for mobile/UniFFI (covered by their own CI jobs).
        run: cargo test --manifest-path openobscure-proxy/Cargo.toml --lib --bin openobscure-proxy --tests

  proxy-cross-arm64:
    name: Cross-check aarch64-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: openobscure-proxy

      - name: Install cross-compilation toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Check (aarch64-linux)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo check --manifest-path openobscure-proxy/Cargo.toml --target aarch64-unknown-linux-gnu

  mobile-build:
    name: Mobile Build (iOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: openobscure-proxy

      - name: Build iOS device (aarch64-apple-ios)
        run: cargo build --manifest-path openobscure-proxy/Cargo.toml --target aarch64-apple-ios --lib --no-default-features --features mobile

      - name: Build iOS simulator (aarch64-apple-ios-sim)
        run: cargo build --manifest-path openobscure-proxy/Cargo.toml --target aarch64-apple-ios-sim --lib --no-default-features --features mobile

  plugin-test:
    name: Plugin Tests (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: openobscure-plugin
        run: npm ci

      - name: Run tests
        working-directory: openobscure-plugin
        run: npm test

  binding-check:
    name: UniFFI Binding Drift Check
    runs-on: macos-14
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: openobscure-proxy
      - uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ort.pyke.io
          key: ort-native-macos-${{ hashFiles('openobscure-proxy/Cargo.lock') }}

      - name: Regenerate bindings
        run: ./build/generate_bindings.sh

      - name: Check for drift
        run: |
          if ! git diff --exit-code bindings/; then
            echo ""
            echo "ERROR: UniFFI bindings are out of date."
            echo "Run './build/generate_bindings.sh' locally and commit the updated bindings."
            exit 1
          fi
          echo "Bindings are up to date."

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format check (proxy)
        run: cargo fmt --manifest-path openobscure-proxy/Cargo.toml -- --check

      - name: Clippy (proxy, default)
        run: cargo clippy --manifest-path openobscure-proxy/Cargo.toml -- -D warnings
