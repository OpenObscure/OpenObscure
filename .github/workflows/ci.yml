name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  proxy-test:
    name: Proxy Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest, windows-latest]
        include:
          - os: macos-14
            native-cache-path: |
              ~/Library/Caches/ort.pyke.io
              ~/Library/Caches/sherpa-rs
          - os: ubuntu-latest
            native-cache-path: |
              ~/.cache/ort.pyke.io
              ~/.cache/sherpa-rs
          - os: windows-latest
            native-cache-path: |
              ~/AppData/Local/ort.pyke.io
              ~/AppData/Local/sherpa-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: openobscure-proxy

      # Cache native library downloads (onnxruntime, sherpa-onnx).
      # Swatinem/rust-cache caches target/ but not these external download dirs.
      # Without this, cached build scripts emit link-search paths to missing libs.
      - name: Cache native libraries
        uses: actions/cache@v4
        with:
          path: ${{ matrix.native-cache-path }}
          key: native-libs-${{ runner.os }}-${{ hashFiles('openobscure-proxy/Cargo.lock') }}

      # Force build scripts to re-run so they re-emit cargo:rustc-link-search
      # pointing to the (now cached) native library directories.
      - name: Invalidate build script cache
        shell: bash
        run: rm -rf openobscure-proxy/target/debug/build/ort-sys-* openobscure-proxy/target/debug/build/sherpa-rs-sys-*

      - name: Test (default features)
        run: cargo test --manifest-path openobscure-proxy/Cargo.toml --lib --bin openobscure-proxy --tests

  proxy-cross-arm64:
    name: Cross-check aarch64-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: openobscure-proxy

      - name: Install cross-compilation toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Check (aarch64-linux)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo check --manifest-path openobscure-proxy/Cargo.toml --target aarch64-unknown-linux-gnu

  mobile-build:
    name: Mobile Build (iOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: openobscure-proxy

      - name: Build iOS device (aarch64-apple-ios)
        run: cargo build --manifest-path openobscure-proxy/Cargo.toml --target aarch64-apple-ios --lib --no-default-features --features mobile

      - name: Build iOS simulator (aarch64-apple-ios-sim)
        run: cargo build --manifest-path openobscure-proxy/Cargo.toml --target aarch64-apple-ios-sim --lib --no-default-features --features mobile

  plugin-test:
    name: Plugin Tests (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: openobscure-plugin
        run: npm ci

      - name: Run tests
        working-directory: openobscure-plugin
        run: npm test

  binding-check:
    name: UniFFI Binding Drift Check
    runs-on: macos-14
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: openobscure-proxy
      - uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ort.pyke.io
          key: ort-native-macos-${{ hashFiles('openobscure-proxy/Cargo.lock') }}

      - name: Regenerate bindings
        run: ./build/generate_bindings.sh

      - name: Check for drift
        run: |
          if ! git diff --exit-code bindings/; then
            echo ""
            echo "ERROR: UniFFI bindings are out of date."
            echo "Run './build/generate_bindings.sh' locally and commit the updated bindings."
            exit 1
          fi
          echo "Bindings are up to date."

      - name: Verify API surface in bindings
        run: |
          echo "Checking Swift bindings for required API surface..."
          for fn in sanitizeAudioTranscript checkAudioPii sanitizeText restoreText getStats sanitizeImage createOpenobscure scanResponse getDebugLog; do
            if ! grep -q "$fn" bindings/swift/openobscure_proxy.swift; then
              echo "ERROR: Missing function '$fn' in Swift bindings"
              exit 1
            fi
          done
          echo "Checking Kotlin bindings for required API surface..."
          for fn in sanitizeAudioTranscript checkAudioPii sanitizeText restoreText getStats sanitizeImage createOpenobscure scanResponse getDebugLog; do
            if ! grep -q "$fn" bindings/kotlin/uniffi/openobscure_proxy/openobscure_proxy.kt; then
              echo "ERROR: Missing function '$fn' in Kotlin bindings"
              exit 1
            fi
          done
          echo "All required functions present in bindings."

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format check (proxy)
        run: cargo fmt --manifest-path openobscure-proxy/Cargo.toml -- --check

      - name: Clippy (proxy, default)
        run: cargo clippy --manifest-path openobscure-proxy/Cargo.toml -- -D warnings
