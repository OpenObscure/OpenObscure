<svg xmlns="http://www.w3.org/2000/svg" width="560" height="370" viewBox="0 0 560 370">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#545b64"/>
    </marker>
  </defs>
  <style>
    text { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
  </style>

  <!-- Host App subgraph -->
  <rect x="30" y="20" width="500" height="212" rx="6" fill="#e6f3f7" stroke="#3b48cc" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="280" y="38" font-size="11" fill="#232F3E" text-anchor="middle" font-weight="600">Host App (Enchanted / RikkaHub / Custom)</text>

  <!-- App UI -->
  <rect x="165" y="50" width="230" height="38" rx="4" fill="#3b48cc" stroke="#232F3E" stroke-width="1"/>
  <text x="280" y="74" font-size="12" fill="#fff" text-anchor="middle">App UI (Swift / Kotlin)</text>

  <!-- OpenObscure Lib subgraph -->
  <rect x="55" y="134" width="450" height="84" rx="5" fill="#f0ebfa" stroke="#545b64" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="280" y="150" font-size="11" fill="#232F3E" text-anchor="middle" font-weight="600">OpenObscure Lib (Rust — L0 core)</text>

  <!-- Scan + Image Pipeline + FPE Encrypt -->
  <rect x="75" y="160" width="190" height="48" rx="4" fill="#545b64" stroke="#232F3E" stroke-width="1"/>
  <text x="170" y="181" font-size="10.5" fill="#fff" text-anchor="middle">Scan + Image Pipeline</text>
  <text x="170" y="196" font-size="10.5" fill="#fff" text-anchor="middle">+ FPE Encrypt</text>

  <!-- FPE Decrypt + Cognitive Firewall -->
  <rect x="295" y="160" width="190" height="48" rx="4" fill="#545b64" stroke="#232F3E" stroke-width="1"/>
  <text x="390" y="181" font-size="10.5" fill="#fff" text-anchor="middle">FPE Decrypt +</text>
  <text x="390" y="196" font-size="10.5" fill="#fff" text-anchor="middle">Cognitive Firewall</text>

  <!-- Internal arrow: UI → encrypt  "sanitizeText() / sanitizeImage()" -->
  <path d="M 220 88 C 170 88, 170 158, 170 158" stroke="#545b64" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="78" y="108" font-size="9.5" fill="#545b64" text-anchor="start">sanitizeText() /</text>
  <text x="78" y="121" font-size="9.5" fill="#545b64" text-anchor="start">sanitizeImage()</text>

  <!-- Internal arrow: decrypt → UI  "restored text + risk report" -->
  <path d="M 390 160 C 390 110, 340 88, 340 88" stroke="#545b64" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="396" y="108" font-size="9.5" fill="#545b64" text-anchor="start">restored text</text>
  <text x="396" y="121" font-size="9.5" fill="#545b64" text-anchor="start">+ risk report</text>

  <!-- LLM Provider  (cy=315, top=283) -->
  <ellipse cx="280" cy="315" rx="100" ry="32" fill="#ff9900" stroke="#232F3E" stroke-width="2"/>
  <text x="280" y="320" font-size="13" fill="#fff" text-anchor="middle" font-weight="600">LLM Provider</text>

  <!-- Arrow: Host App → LLM "HTTPS (PII encrypted)" (232→285) -->
  <line x1="200" y1="232" x2="228" y2="285" stroke="#545b64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="130" y="255" font-size="9.5" fill="#545b64" text-anchor="start">HTTPS</text>
  <text x="130" y="268" font-size="9.5" fill="#545b64" text-anchor="start">(PII encrypted)</text>

  <!-- Arrow: LLM → Host App "response" (287→232) -->
  <line x1="338" y1="287" x2="390" y2="232" stroke="#545b64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="396" y="262" font-size="9.5" fill="#545b64" text-anchor="start">response</text>
</svg>
