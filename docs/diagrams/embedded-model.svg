<svg xmlns="http://www.w3.org/2000/svg" width="560" height="480" viewBox="0 0 560 480">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#545b64"/>
    </marker>
  </defs>
  <style>
    text { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
  </style>

  <!-- Host App subgraph -->
  <rect x="30" y="20" width="500" height="310" rx="6" fill="#e6f3f7" stroke="#3b48cc" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="280" y="38" font-size="11" fill="#232F3E" text-anchor="middle" font-weight="600">Host App (Enchanted / RikkaHub / custom)</text>

  <!-- App UI -->
  <rect x="185" y="50" width="190" height="36" rx="4" fill="#3b48cc" stroke="#232F3E" stroke-width="1"/>
  <text x="280" y="73" font-size="12" fill="#fff" text-anchor="middle">App UI (Swift / Kotlin)</text>

  <!-- OpenObscure lib subgraph -->
  <rect x="55" y="116" width="450" height="194" rx="5" fill="#f0ebfa" stroke="#545b64" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="280" y="133" font-size="11" fill="#232F3E" text-anchor="middle" font-weight="600">OpenObscure lib (Rust — same L0 core)</text>

  <!-- Scan + Image Pipeline + FPE Encrypt -->
  <rect x="75" y="145" width="190" height="44" rx="4" fill="#545b64" stroke="#232F3E" stroke-width="1"/>
  <text x="170" y="163" font-size="10.5" fill="#fff" text-anchor="middle">Scan + Image Pipeline</text>
  <text x="170" y="177" font-size="10.5" fill="#fff" text-anchor="middle">+ FPE Encrypt</text>

  <!-- FPE Decrypt + Cognitive Firewall -->
  <rect x="295" y="145" width="190" height="44" rx="4" fill="#545b64" stroke="#232F3E" stroke-width="1"/>
  <text x="390" y="163" font-size="10.5" fill="#fff" text-anchor="middle">FPE Decrypt +</text>
  <text x="390" y="177" font-size="10.5" fill="#fff" text-anchor="middle">Cognitive Firewall</text>

  <!-- Internal arrows: ui → enc "sanitizeText() / sanitizeImage()" -->
  <path d="M 220 86 C 170 86 170 143 170 143" stroke="#545b64" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="60" y="108" font-size="9.5" fill="#545b64">sanitizeText() /</text>
  <text x="60" y="120" font-size="9.5" fill="#545b64">sanitizeImage()</text>

  <!-- Internal arrows: dec → ui "restored text + risk report" -->
  <path d="M 390 145 C 390 108 340 86 340 86" stroke="#545b64" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="368" y="108" font-size="9.5" fill="#545b64">restored text</text>
  <text x="368" y="120" font-size="9.5" fill="#545b64">+ risk report</text>

  <!-- LLM Provider -->
  <ellipse cx="280" cy="420" rx="90" ry="30" fill="#ff9900" stroke="#232F3E" stroke-width="2"/>
  <text x="280" y="425" font-size="13" fill="#fff" text-anchor="middle" font-weight="600">LLM Provider</text>

  <!-- Arrow: app → llm "HTTPS (PII encrypted)" -->
  <line x1="200" y1="330" x2="240" y2="390" stroke="#545b64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="120" y="362" font-size="10" fill="#545b64">HTTPS (PII encrypted)</text>

  <!-- Arrow: llm → app "response" -->
  <line x1="360" y1="390" x2="400" y2="330" stroke="#545b64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="406" y="362" font-size="10" fill="#545b64">response</text>
</svg>
