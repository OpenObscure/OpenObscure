<svg xmlns="http://www.w3.org/2000/svg" width="600" height="470" viewBox="0 0 600 470">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#545b64"/>
    </marker>
  </defs>
  <style>
    text { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
  </style>

  <!-- Agent Tools -->
  <rect x="220" y="20" width="160" height="36" rx="5" fill="#3F4756" stroke="#545b64" stroke-width="1.5"/>
  <text x="300" y="43" font-size="13" fill="#fff" text-anchor="middle">Agent Tools</text>

  <!-- AI Agent Gateway subgraph -->
  <rect x="30" y="80" width="540" height="112" rx="6" fill="#e6f3f7" stroke="#3b48cc" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="300" y="97" font-size="11" fill="#232F3E" text-anchor="middle" font-weight="600">AI Agent Gateway (e.g. OpenClaw)</text>

  <!-- L1 Plugin subgraph -->
  <rect x="55" y="105" width="490" height="78" rx="5" fill="#f0ebfa" stroke="#9D7BED" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="300" y="121" font-size="11" fill="#232F3E" text-anchor="middle" font-weight="600">L1 Plugin</text>

  <!-- PII Redactor -->
  <rect x="80" y="132" width="200" height="40" rx="4" fill="#9D7BED" stroke="#232F3E" stroke-width="1"/>
  <text x="180" y="157" font-size="12" fill="#fff" text-anchor="middle">PII Redactor</text>

  <!-- Heartbeat Monitor -->
  <rect x="320" y="132" width="200" height="40" rx="4" fill="#9D7BED" stroke="#232F3E" stroke-width="1"/>
  <text x="420" y="157" font-size="12" fill="#fff" text-anchor="middle">Heartbeat Monitor</text>

  <!-- L0 Proxy subgraph  (top=240, bottom=326) -->
  <rect x="30" y="240" width="540" height="86" rx="6" fill="#e6f3f7" stroke="#545b64" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="300" y="258" font-size="11" fill="#232F3E" text-anchor="middle" font-weight="600">L0 Proxy — 127.0.0.1:18790</text>

  <!-- Scan + Image Pipeline + FPE Encrypt  (top=268, bottom=316) -->
  <rect x="48" y="268" width="235" height="48" rx="4" fill="#545b64" stroke="#232F3E" stroke-width="1"/>
  <text x="165" y="289" font-size="10.5" fill="#fff" text-anchor="middle">Scan + Image Pipeline</text>
  <text x="165" y="305" font-size="10.5" fill="#fff" text-anchor="middle">+ FPE Encrypt</text>

  <!-- FPE Decrypt + Response Integrity  (top=268, bottom=316) -->
  <rect x="317" y="268" width="235" height="48" rx="4" fill="#545b64" stroke="#232F3E" stroke-width="1"/>
  <text x="434" y="289" font-size="10.5" fill="#fff" text-anchor="middle">FPE Decrypt +</text>
  <text x="434" y="305" font-size="10.5" fill="#fff" text-anchor="middle">Response Integrity</text>

  <!-- LLM Providers  (cy=415, top=383) -->
  <ellipse cx="300" cy="415" rx="100" ry="32" fill="#ff9900" stroke="#232F3E" stroke-width="2"/>
  <text x="300" y="420" font-size="13" fill="#fff" text-anchor="middle" font-weight="600">LLM Providers</text>

  <!-- Arrow 1: tools → gateway -->
  <line x1="300" y1="56" x2="300" y2="78" stroke="#545b64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="310" y="72" font-size="9.5" fill="#545b64" text-anchor="start">tool results</text>

  <!-- Arrow 2: gateway → L0 "HTTP" (left side, 192→238) -->
  <line x1="165" y1="192" x2="165" y2="238" stroke="#545b64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="173" y="220" font-size="9.5" fill="#545b64" text-anchor="start">HTTP</text>

  <!-- Arrow 3: L0 → LLM "sanitized HTTPS" (left diagonal) -->
  <line x1="165" y1="316" x2="225" y2="394" stroke="#545b64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="100" y="355" font-size="9.5" fill="#545b64" text-anchor="start">sanitized</text>
  <text x="100" y="368" font-size="9.5" fill="#545b64" text-anchor="start">HTTPS</text>

  <!-- Arrow 4: LLM → L0 "response" (right diagonal) -->
  <line x1="375" y1="394" x2="434" y2="316" stroke="#545b64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="443" y="360" font-size="9.5" fill="#545b64" text-anchor="start">response</text>

  <!-- Arrow 5: L0 → gateway "labeled" (right side, 268→194) -->
  <line x1="434" y1="268" x2="434" y2="194" stroke="#545b64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="443" y="236" font-size="9.5" fill="#545b64" text-anchor="start">labeled</text>
</svg>
